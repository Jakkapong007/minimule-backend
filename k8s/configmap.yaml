apiVersion: v1
kind: ConfigMap
metadata:
  name: minimule-config
  namespace: minimule
data:
  ENV: "production"
  PORT: "8080"
  GRAPHQL_PLAYGROUND: "false"
  QUERY_DEPTH_LIMIT: "10"
  QUERY_COMPLEXITY_LIMIT: "1000"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "1m"
  JWT_ACCESS_TTL: "15m"
  JWT_REFRESH_TTL: "168h"
  DB_MAX_CONNS: "25"
  DB_MIN_CONNS: "5"
  REDIS_DB: "0"
