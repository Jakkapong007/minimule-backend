# Requires nginx ingress controller + cert-manager in the cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minimule-ingress
  namespace: minimule
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.minimule.com
      secretName: minimule-tls
  rules:
    - host: api.minimule.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minimule-api-svc
                port:
                  number: 80
