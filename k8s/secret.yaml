# EXAMPLE ONLY — never commit real secrets.
# Use Sealed Secrets, External Secrets Operator, or a vault instead.
apiVersion: v1
kind: Secret
metadata:
  name: minimule-secret
  namespace: minimule
type: Opaque
stringData:
  DATABASE_URL: "postgres://minimule:CHANGE_ME@postgres-svc:5432/minimule?sslmode=require"
  REDIS_ADDR: "redis-svc:6379"
  REDIS_PASSWORD: ""
  JWT_SECRET: "CHANGE_ME_TO_A_LONG_RANDOM_STRING"
  CORS_ORIGINS: "https://app.minimule.com,https://www.minimule.com"
